server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # geolocation=(self): el botón «Mi punto de encuentro» pide la ubicación
    # desde el propio origen; con la allowlist vacía la API queda deshabilitada
    # para TODO el sitio y el permiso del navegador no puede hacer nada.
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    # script-src incluye static.cloudflareinsights.com: es el beacon de
    # Cloudflare Web Analytics (mismo proveedor del túnel); el POST de datos
    # va a /cdn-cgi/rum, mismo origen, ya cubierto por connect-src 'self'.
    # script-src también lleva el hash del <script> inline de theme.js en
    # index.html (evita el round-trip externo, ver comentario ahí). style-src
    # lleva el hash del <style> inline de fonts.css en index.html Y el hash
    # preexistente del <style> del checklist/plan en emergencia.html — este
    # último estaba silenciosamente bloqueado por la CSP antes de este cambio
    # (confirmado: .kit-item se veía sin su display:flex). Si cualquiera de
    # los 3 bloques inline cambia de contenido, hay que recalcular su hash
    # (sha256, base64) o el navegador lo vuelve a bloquear en silencio.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com 'sha256-jget3hv8ZFIoSXQ3MEHcfcbwMmBZlbH45Uhvk2tU5Qg='; style-src 'self' 'sha256-aa9Pi0V1HS1+K8wrxKsIAjUP16ANRBqtD9VWhYQGMbY=' 'sha256-CGLio4+mCH+uKLXuQDE/PGrPKOSTFFHaTEMw11GQ998='; img-src 'self' data: https://*.basemaps.cartocdn.com https://gibs.earthdata.nasa.gov https://server.arcgisonline.com; connect-src 'self' https://api.open-meteo.com https://ensemble-api.open-meteo.com https://geocoding-api.open-meteo.com https://air-quality-api.open-meteo.com https://*.basemaps.cartocdn.com https://gibs.earthdata.nasa.gov; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/css application/javascript application/json font/woff2 application/manifest+json;

    # status.json lo escribe la ingesta en /data (separación de privilegios:
    # la ingesta nunca toca los archivos del sitio).
    # expires -1 → Cache-Control no-cache: ni Cloudflare ni el navegador
    # retienen datos vivos ni el service worker.
    location = /status.json {
        alias /data/status.json;
        expires -1;
    }

    location = /verificacion.json {
        alias /data/verificacion.json;
        expires -1;
    }

    location = /estaciones.json {
        alias /data/estaciones.json;
        expires -1;
    }

    location = /aire.json {
        alias /data/aire.json;
        expires -1;
    }

    location = /bias.json {
        alias /data/bias.json;
        expires -1;
    }

    location = /avisos.json {
        alias /data/avisos.json;
        expires -1;
    }

    location = /sismos.json {
        alias /data/sismos.json;
        expires -1;
    }

    location = /incendios.json {
        alias /data/incendios.json;
        expires -1;
    }

    location = /alertas.json {
        alias /data/alertas.json;
        expires -1;
    }

    location = /volcanes.json {
        alias /data/volcanes.json;
        expires -1;
    }

    location = /emergencia.json {
        alias /data/emergencia.json;
        expires -1;
    }

    location = /remociones.json {
        alias /data/remociones.json;
        expires -1;
    }

    location = /tsunami_vias.json {
        alias /data/tsunami_vias.json;
        expires -1;
    }

    location = /tsunami_areas.json {
        alias /data/tsunami_areas.json;
        expires -1;
    }

    location = /marea.json {
        alias /data/marea.json;
        expires -1;
    }

    location = /tsunami.json {
        alias /data/tsunami.json;
        expires -1;
    }

    location = /cortes.json {
        alias /data/cortes.json;
        expires -1;
    }

    location = /farmacias.json {
        alias /data/farmacias.json;
        expires -1;
    }

    location = /combustible.json {
        alias /data/combustible.json;
        expires -1;
    }

    location = /crecidas.json {
        alias /data/crecidas.json;
        expires -1;
    }

    location = /sw.js {
        expires -1;
        try_files $uri =404;
    }

    # JS/CSS/fuentes van cache-busteados por ?v=N (JS/CSS) o por nombre de
    # archivo (fuentes): un año + immutable es seguro, el bump de versión ya
    # invalida la URL. sw.js ya matcheó arriba (location = gana sobre regex).
    location ~* \.(?:js|css|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Backend de notificaciones push (contenedor `push`, red interna de
    # compose). connect-src 'self' de la CSP ya cubre esto: es same-origin.
    # proxy_pass a un hostname LITERAL resuelve una sola vez al arrancar
    # nginx y cachea esa IP para siempre; si el contenedor `push` se
    # reinicia después (o hay una carrera al levantar todo con `docker
    # compose restart`) nginx queda con una IP vieja y /api/push/* da 502
    # hasta el próximo reinicio de nginx (incidente real: "no se pudo
    # activar los avisos de emergencia"). Con la IP en una variable, nginx
    # resuelve por request contra el resolver embebido de Docker (con TTL
    # corto) en vez de cachear para siempre.
    location /api/push/ {
        resolver 127.0.0.11 valid=10s;
        set $push_upstream push:8300;
        proxy_pass http://$push_upstream;
        proxy_set_header X-Forwarded-For $remote_addr;
        client_max_body_size 8k;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
