# Vigía — vigia.cavara.cl
# web:     nginx estático endurecido, solo expuesto en 127.0.0.1 (entra por
#          Cloudflare Tunnel; nada abierto a LAN ni a internet).
# ingesta: crond + Python stdlib, sin puertos; archiva pronósticos y
#          observaciones en ./data/clima.db.
services:
  web:
    image: nginx:1.27-alpine
    container_name: clima-web
    ports:
      - "127.0.0.1:${VIGIA_HTTP_PORT:-8100}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data:/data:ro
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  ingesta:
    image: python:3.12-alpine
    container_name: clima-ingesta
    working_dir: /app
    # el crontab se copia (no se monta) a /etc/crontabs/root: BusyBox crond
    # exige que sea de root y el bind-mount preserva el uid del host
    command: sh -c "cp /crontab-src /etc/crontabs/root && chown root:root /etc/crontabs/root && exec crond -f -l 6"
    environment:
      TZ: America/Santiago
      CLIMA_DB: /data/clima.db
      CLIMA_STATUS: /data/status.json
      CLIMA_VERIF: /data/verificacion.json
      CLIMA_ESTACIONES: /data/estaciones.json
      CLIMA_AIRE: /data/aire.json
      CLIMA_BIAS: /data/bias.json
      CLIMA_AVISOS: /data/avisos.json
      CLIMA_SISMOS: /data/sismos.json
      CLIMA_INCENDIOS: /data/incendios.json
      CLIMA_ALERTAS: /data/alertas.json
      CLIMA_VOLCANES: /data/volcanes.json
      CLIMA_EMERGENCIA: /data/emergencia.json
      CLIMA_REMOCIONES: /data/remociones.json
      CLIMA_TSUNAMI_VIAS: /data/tsunami_vias.json
      CLIMA_TSUNAMI_AREAS: /data/tsunami_areas.json
      CLIMA_MAREA: /data/marea.json
      CLIMA_TSUNAMI: /data/tsunami.json
      CLIMA_CORTES: /data/cortes.json
      CLIMA_INCOMING: /data/incoming
      DMC_USUARIO: ${DMC_USUARIO:-}
      DMC_TOKEN: ${DMC_TOKEN:-}
      DMC_STATIONS: ${DMC_STATIONS:-}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
    volumes:
      - ./ingesta:/app/ingesta:ro
      - ./deploy/crontab:/crontab-src:ro
      - ./data:/data
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  push:
    build: ./push
    container_name: clima-push
    working_dir: /app
    # server.py (suscripciones) corre en foreground; crond (envío) en background.
    command: sh -c "cp /app/push/crontab /etc/crontabs/root && chown root:root /etc/crontabs/root && crond -l 6 && exec python3 /app/push/server.py"
    environment:
      TZ: America/Santiago
      PUSH_DB: /data/push.db
      PUSH_SISMOS: /data/sismos.json
      PUSH_ALERTAS: /data/alertas.json
      PUSH_VOLCANES: /data/volcanes.json
      PUSH_TSUNAMI: /data/tsunami.json
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:?}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CONTACT: ${VAPID_CONTACT:-}
    volumes:
      - ./push:/app/push:ro
      - ./data:/data
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
